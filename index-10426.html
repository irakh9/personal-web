<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ilkhombek Rakhmatullaev</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f2ed;
  --bg2:#edeae4;
  --bg3:#e4e0d8;
  --ink:#1a1714;
  --ink2:#4a443c;
  --ink3:#8c8278;
  --red:#c0392b;
  --border:rgba(26,23,20,0.1);
  --border2:rgba(26,23,20,0.2);
  --card:#ffffff;
}
html{scroll-behavior:smooth}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--ink);
  font-size:15px;
  line-height:1.7;
  overflow-x:hidden;
}

/* INTRO */
#intro{
  position:fixed;inset:0;z-index:9999;
  background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;
}
.intro-line{
  font-family:'Syne',sans-serif;
  font-weight:800;
  color:#f5f2ed;
  letter-spacing:-.02em;
  line-height:1.1;
  overflow:hidden;
  white-space:nowrap;
}
.intro-line.ln1{font-size:clamp(2.8rem,7vw,5.5rem)}
.intro-line.ln2{font-size:clamp(2.8rem,7vw,5.5rem);color:transparent;-webkit-text-stroke:1.5px rgba(245,242,237,.35)}
.intro-line .chars{
  display:inline-block;
  transform:translateY(110%);
  animation:slideup .7s cubic-bezier(.4,0,.2,1) forwards;
}
.intro-line.ln2 .chars{animation-delay:.35s}
.intro-cursor{
  display:inline-block;width:3px;height:.85em;
  background:var(--red);margin-left:4px;vertical-align:middle;
  animation:blink .6s step-end infinite;
  opacity:0;animation:cursorin .01s ease .1s forwards, blink .55s step-end .1s infinite;
}
@keyframes slideup{to{transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes cursorin{to{opacity:1}}
#intro.out{animation:iout .7s cubic-bezier(.7,0,1,1) 2.8s forwards;pointer-events:none}
@keyframes iout{to{opacity:0;transform:scale(1.05)}}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(245,242,237,0.88);
  backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
  height:60px;padding:0 3rem;
  display:flex;align-items:center;justify-content:space-between;
  opacity:0;animation:fadein .5s ease 3.4s forwards;
}
@keyframes fadein{to{opacity:1}}
.nav-logo{
  font-family:'Syne',sans-serif;font-weight:800;font-size:20px;
  color:var(--ink);text-decoration:none;letter-spacing:-.02em;
}
.nav-logo em{color:var(--red);font-style:normal}
.nav-links{display:flex;gap:2.5rem;list-style:none}
.nav-links a{
  font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink3);text-decoration:none;
  position:relative;transition:color .2s;
}
.nav-links a::after{
  content:'';position:absolute;left:0;bottom:-3px;
  width:0;height:1.5px;background:var(--red);transition:width .25s;
}
.nav-links a:hover{color:var(--ink)}
.nav-links a:hover::after{width:100%}

/* MAIN */
main{opacity:0;animation:fadein .7s ease 3.5s forwards}

/* HERO */
.hero{
  min-height:100vh;
  max-width:1100px;margin:0 auto;
  padding:0 3rem;
  display:grid;grid-template-columns:1fr 1fr;gap:4rem;
  align-items:center;padding-top:60px;
}
.hero-eyebrow{
  font-family:'Syne',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;color:var(--red);
  display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;
}
.hero-eyebrow::before{content:'';display:block;width:28px;height:1.5px;background:var(--red)}
h1.hero-name{
  font-family:'Syne',sans-serif;
  font-size:clamp(2.6rem,4.5vw,4rem);
  font-weight:800;line-height:1.05;letter-spacing:-.03em;
  margin-bottom:.4rem;
}
h1.hero-name .outline{
  display:block;
  color:transparent;
  -webkit-text-stroke:1.5px var(--ink);
}
.hero-role{
  font-size:14px;font-weight:400;color:var(--ink3);
  margin-bottom:2rem;letter-spacing:.01em;
}
.hero-bio{
  font-size:15px;color:var(--ink2);line-height:1.8;
  max-width:440px;margin-bottom:2.5rem;
  border-left:2.5px solid var(--red);padding-left:1.25rem;
}
.hero-contacts{display:flex;flex-direction:column;gap:8px}
.clink{
  display:inline-flex;align-items:center;gap:10px;
  font-size:13px;color:var(--ink2);text-decoration:none;
  width:fit-content;transition:color .2s;
}
.clink:hover{color:var(--red)}
.cdot{width:5px;height:5px;border-radius:50%;background:var(--ink3);flex-shrink:0;transition:background .2s}
.clink:hover .cdot{background:var(--red)}

/* hero right */
.hero-right{position:relative;display:flex;align-items:center;justify-content:center}
.big-initials{
  font-family:'Syne',sans-serif;font-size:clamp(11rem,17vw,17rem);
  font-weight:800;color:transparent;
  -webkit-text-stroke:1px rgba(26,23,20,.1);
  letter-spacing:-.04em;line-height:1;user-select:none;
}
.hero-tags{
  position:absolute;bottom:8%;left:0;right:0;
  display:flex;flex-wrap:wrap;gap:7px;justify-content:center;
}
.tag{
  font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  padding:5px 12px;border-radius:20px;
  border:1px solid var(--border2);color:var(--ink3);background:var(--bg);
  transition:all .2s;cursor:default;
}
.tag:hover{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* SECTIONS */
.section{
  max-width:1100px;margin:0 auto;
  padding:5rem 3rem;border-top:1px solid var(--border);
}
.s-head{
  display:grid;grid-template-columns:72px 1fr;
  align-items:baseline;gap:1rem;margin-bottom:3rem;
}
.s-num{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--red);letter-spacing:.1em}
h2.s-title{
  font-family:'Syne',sans-serif;
  font-size:clamp(1.5rem,2.4vw,2.1rem);
  font-weight:700;letter-spacing:-.02em;color:var(--ink);
}

/* EXPERIENCE */
.exp-item{
  display:grid;grid-template-columns:190px 1fr;gap:3rem;
  padding:2.5rem 0;border-bottom:1px solid var(--border);
  position:relative;
}
.exp-item::before{
  content:'';position:absolute;left:-3rem;right:-3rem;top:0;bottom:0;
  background:transparent;transition:background .3s;z-index:-1;border-radius:6px;
}
.exp-item:hover::before{background:rgba(255,255,255,.75)}
.exp-item:last-child{border-bottom:none}
.exp-period{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.05em;margin-bottom:5px}
.exp-org{font-size:13px;color:var(--ink2);line-height:1.4;margin-bottom:7px}
.badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:var(--red);color:#fff;padding:3px 9px;border-radius:3px}
.exp-role{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700;color:var(--ink);letter-spacing:-.01em;margin-bottom:1rem}
.exp-pts{list-style:none;display:flex;flex-direction:column;gap:6px}
.exp-pts li{font-size:14px;color:var(--ink2);padding-left:1.1rem;position:relative;line-height:1.65}
.exp-pts li::before{content:'';position:absolute;left:0;top:11px;width:4px;height:1.5px;background:var(--red)}
.prods{display:flex;flex-wrap:wrap;gap:7px;margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--border)}
.ppill{font-size:12px;font-weight:500;color:var(--ink2);padding:4px 11px;border-radius:4px;background:var(--bg2);border:1px solid var(--border);cursor:default;transition:all .2s}
.ppill:hover{background:var(--ink);color:var(--bg)}

/* SKILLS */
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.sk-card{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:1.2rem 1.4rem;transition:transform .2s,box-shadow .2s,border-color .2s;
}
.sk-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(26,23,20,.07);border-color:var(--border2)}
.sk-cat{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:7px}
.sk-items{font-size:13.5px;color:var(--ink2);line-height:1.65}

/* CERTS */
.certs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:10px;margin-bottom:2rem}
.cert{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:.95rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;
  transition:border-color .2s,transform .2s;
}
.cert:hover{border-color:var(--red);transform:translateX(4px)}
.cert-name{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:2px}
.cert-by{font-size:12px;color:var(--ink3)}
.cert-yr{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--red);white-space:nowrap;flex-shrink:0}
.edu-blk{
  background:var(--ink);border-radius:10px;padding:2rem 2.5rem;
  display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap;
}
.edu-deg{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--bg);margin-bottom:5px}
.edu-uni{font-size:14px;color:rgba(245,242,237,.55)}
.edu-yr{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;color:transparent;-webkit-text-stroke:1px rgba(245,242,237,.2);white-space:nowrap}

/* ABOUT */
.about-cols{display:grid;grid-template-columns:1fr 2fr;gap:3rem}
.ab-title{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:1.1rem}
.lang-list,.q-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.lang-list li{font-size:14px;color:var(--ink2)}
.lang-lv{font-size:12px;color:var(--ink3);display:block;margin-top:1px}
.q-list li{font-size:14px;color:var(--ink2);padding-left:1.1rem;position:relative;line-height:1.55}
.q-list li::before{content:'→';position:absolute;left:0;color:var(--ink3);font-size:11px;top:2px}

footer{
  border-top:1px solid var(--border);padding:2rem 3rem;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;
}
.flogo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--ink)}
.flogo em{color:var(--red);font-style:normal}
.finfo{font-size:12px;color:var(--ink3)}

/* REVEAL */
.reveal{opacity:0;transform:translateY(26px);transition:opacity .65s ease,transform .65s ease}
.reveal.vis{opacity:1;transform:none}

/* CURSOR */
.cur,.cur-ring{position:fixed;border-radius:50%;pointer-events:none;z-index:9000}
.cur{width:7px;height:7px;background:var(--red);mix-blend-mode:multiply}
.cur-ring{width:30px;height:30px;border:1.5px solid var(--red);opacity:.45;transition:transform .22s ease,opacity .22s ease}

@media(max-width:768px){
  .hero{grid-template-columns:1fr;padding-top:80px;min-height:auto;padding-bottom:3rem}
  .hero-right{display:none}
  nav{padding:0 1.25rem}
  .section{padding:3rem 1.25rem}
  .exp-item{grid-template-columns:1fr;gap:.8rem}
  .about-cols{grid-template-columns:1fr}
  footer{padding:1.5rem}
}
</style>
</head>
<body>

<div class="cur" id="cur"></div>
<div class="cur-ring" id="curR"></div>

<!-- ═══════════ INTRO ═══════════ -->
<div id="intro">
  <div class="intro-line ln1"><span class="chars">Ilkhombek</span></div>
  <div class="intro-line ln2"><span class="chars">Rakhmatullaev<span class="intro-cursor"></span></span></div>
</div>

<!-- ═══════════ NAV ═══════════ -->
<nav>
  <a class="nav-logo" href="#"><em>IR</em> /</a>
  <ul class="nav-links">
    <li><a href="#experience">Experience</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#certs">Certs</a></li>
    <li><a href="#about">About</a></li>
  </ul>
</nav>

<main>
<!-- HERO -->
<section class="hero">
  <div>
    <div class="hero-eyebrow" id="hEye"></div>
    <h1 class="hero-name"><span id="hFirst"></span><span class="outline" id="hLast"></span></h1>
    <p class="hero-role" id="hRole"></p>
    <p class="hero-bio" id="hBio"></p>
    <div class="hero-contacts" id="hContacts"></div>
  </div>
  <div class="hero-right">
    <div class="big-initials" id="hInit"></div>
    <div class="hero-tags" id="hTags"></div>
  </div>
</section>

<section class="section reveal" id="experience">
  <div class="s-head"><span class="s-num">01</span><h2 class="s-title">Experience</h2></div>
  <div id="expList"></div>
</section>

<section class="section reveal" id="skills">
  <div class="s-head"><span class="s-num">02</span><h2 class="s-title">Skills</h2></div>
  <div class="skills-grid" id="skillsGrid"></div>
</section>

<section class="section reveal" id="certs">
  <div class="s-head"><span class="s-num">03</span><h2 class="s-title">Certifications &amp; Education</h2></div>
  <div class="certs-grid" id="certsGrid"></div>
  <div id="eduBlock"></div>
</section>

<section class="section reveal" id="about">
  <div class="s-head"><span class="s-num">04</span><h2 class="s-title">About</h2></div>
  <div class="about-cols" id="aboutCols"></div>
</section>
</main>

<footer>
  <div class="flogo"><em>IR</em> /</div>
  <div class="finfo" id="fInfo"></div>
</footer>


<!-- ═══════════════════════════════════════════════════════
     ✏️  ВСЁ ЧТО НУЖНО РЕДАКТИРОВАТЬ — ТОЛЬКО ЭТОТ БЛОК
     ═══════════════════════════════════════════════════════ -->
<script>
const CONTENT = {

  /* ── ШАПКА (HERO) ──────────────────────────────────────
     eyebrow  — маленький текст над именем
     firstName / lastName — имя и фамилия
     initials — большие буквы справа
     role     — подзаголовок под именем
     bio      — короткий абзац о себе
     contacts — массив { label, href }  (href: null = просто текст)
     tags     — массив ключевых слов
  ────────────────────────────────────────────────────── */
  hero: {
    eyebrow:   "Cybersecurity & Presales Engineering",
    firstName: "Ilkhombek",
    lastName:  "Rakhmatullaev",
    initials:  "IR",
    role:      "Unified Pre-sales Engineer @ Group-IB · Tashkent, Uzbekistan",
    bio:       "IT professional with 4+ years in system administration and infrastructure — now fully focused on cybersecurity. I help enterprise clients design and adopt advanced security solutions.",
    contacts: [
      { label: "ilkhombefin@gmail.com", href: "mailto:ilkhombefin@gmail.com" },
      { label: "+998 90 399 8933",      href: "tel:+998903998933" },
      { label: "Tashkent, Uzbekistan",  href: null }
    ],
    tags: ["Threat Intelligence","Presales Engineering","Security Architecture","Incident Response","XDR / SOC","Group-IB"]
  },

  /* ── ОПЫТ РАБОТЫ ────────────────────────────────────────
     Добавляй новые объекты в начало массива.
     current: true  →  показывает бейдж "Current"
     products: []   →  если пустой — блок с продуктами не отображается
  ────────────────────────────────────────────────────── */
  experience: [
    {
      period:  "06.2025 — Present",
      company: "Group-IB",
      current: true,
      role:    "Unified Pre-sales Engineer",
      points: [
        "Technical presentations across Group-IB's full ecosystem: Threat Intelligence, Managed XDR, Fraud Protection, Digital Risk Protection, and Attack Surface Management.",
        "Led end-to-end Proof of Concept (PoC) projects for software and expert services including Incident Response and Security Audits.",
        "Designed multi-layered security architectures based on client IT infrastructure analysis.",
        "Primary cybersecurity consultant during the presales cycle — architecture designs, technical docs, and RFP/RFI responses."
      ],
      products: ["Threat Intelligence","Attack Surface Management","Digital Risk Protection","Managed XDR","Fraud Protection"]
    },
    {
      period:  "03.2023 — 06.2025",
      company: "Samsung Electronics, Tashkent",
      current: false,
      role:    "System Administrator — IT Support",
      points: [
        "Administered Windows Server 2019: DHCP, GPO, Active Directory.",
        "Managed NextCloud file server and antivirus solutions (AhnLab V3, Symantec).",
        "Conducted regular security audits of network and systems infrastructure.",
        "Configured SVPN, Escort Nasca servers, Zscaler proxy."
      ],
      products: []
    },
    {
      period:  "09.2021 — 02.2023",
      company: "British School of Tashkent",
      current: false,
      role:    "System Administrator",
      points: [
        "Administered Windows Server environments and Microsoft Azure accounts with 2FA.",
        "User support and daily request handling via SDP ticketing system.",
        "Maintenance and updates of management information systems."
      ],
      products: []
    }
  ],

  /* ── НАВЫКИ ─────────────────────────────────────────────
     category — категория (заголовок)
     items    — список через запятую
  ────────────────────────────────────────────────────── */
  skills: [
    { category: "Presales",           items: "PoC design & execution, RFP/RFI responses, solution architecture, technical demos" },
    { category: "Cybersecurity",      items: "Threat landscape analysis, security audits, IR consulting, multi-layer security design" },
    { category: "Operating Systems",  items: "Windows, macOS, Linux (Ubuntu, CentOS)" },
    { category: "Networking",         items: "TCP/IP, DHCP, DNS, VPN, Zscaler proxy" },
    { category: "Servers & Virt.",    items: "Windows Server (AD, GPO, DHCP), VMware ESXi, Hyper-V" },
    { category: "Cloud & Monitoring", items: "Microsoft Azure, Zabbix" },
    { category: "Automation & Dev",   items: "Ansible, Bash, Docker, Nginx, MySQL, PostgreSQL, Git" },
    { category: "Soft Skills",        items: "Client presentations, stakeholder alignment, consulting, Agile/Waterfall PM" }
  ],

  /* ── СЕРТИФИКАТЫ ────────────────────────────────────────
     name   — название
     issuer — кто выдал
     year   — год или период
  ────────────────────────────────────────────────────── */
  certs: [
    { name: "Threat Intelligence Analyst",              issuer: "Group-IB",  year: "Dec 2025" },
    { name: "Agile Project Management Fundamentals",    issuer: "Udemy",     year: "Apr 2025" },
    { name: "DevOps",                                   issuer: "TMS",       year: "2023–2024" },
    { name: "CCNA — Cisco Certified Network Associate", issuer: "Cisco",     year: "2023" },
    { name: "Microsoft Windows Server 2016",            issuer: "Microsoft", year: "—" }
  ],

  /* ── ОБРАЗОВАНИЕ ────────────────────────────────────── */
  education: {
    degree:     "Bachelor's Degree — Computer Information Systems in Business",
    university: "MDIST — Management Development Institution of Singapore",
    years:      "2018 – 2022"
  },

  /* ── О СЕБЕ ─────────────────────────────────────────── */
  about: {
    languages: [
      { lang: "Uzbek",   level: "Native" },
      { lang: "Russian", level: "Fluent" },
      { lang: "English", level: "Professional" }
    ],
    qualities: [
      "Confident in client-facing environments and technical demos",
      "Translates complex technical concepts into clear business value",
      "Detail-oriented with a consistent focus on quality outcomes",
      "Calm under pressure — thrives in high-stakes PoCs and live demos",
      "Self-motivated learner, continuously expanding skills",
      "Bridges the gap between technical teams and business stakeholders"
    ]
  }
};
/* ═══════════════════════════════════════════
   КОНЕЦ РЕДАКТИРУЕМОГО БЛОКА
   ═══════════════════════════════════════════ */


/* ─── RENDER ──────────────────────────────── */
(()=>{
  const C=CONTENT;
  const $ = id => document.getElementById(id);

  // Hero
  $('hEye').textContent    = C.hero.eyebrow;
  $('hFirst').textContent  = C.hero.firstName+' ';
  $('hLast').textContent   = C.hero.lastName;
  $('hRole').textContent   = C.hero.role;
  $('hBio').textContent    = C.hero.bio;
  $('hInit').textContent   = C.hero.initials;

  C.hero.contacts.forEach(c=>{
    const el = c.href ? document.createElement('a') : document.createElement('span');
    el.className='clink';if(c.href)el.href=c.href;
    el.innerHTML=`<span class="cdot"></span>${c.label}`;
    $('hContacts').appendChild(el);
  });
  C.hero.tags.forEach(t=>{
    const s=document.createElement('span');s.className='tag';s.textContent=t;$('hTags').appendChild(s);
  });

  // Experience
  C.experience.forEach(e=>{
    const prods = e.products.length
      ? `<div class="prods">${e.products.map(p=>`<span class="ppill">${p}</span>`).join('')}</div>` : '';
    $('expList').insertAdjacentHTML('beforeend',`
    <div class="exp-item">
      <div>
        <div class="exp-period">${e.period}</div>
        <div class="exp-org">${e.company}</div>
        ${e.current?'<span class="badge">Current</span>':''}
      </div>
      <div>
        <div class="exp-role">${e.role}</div>
        <ul class="exp-pts">${e.points.map(p=>`<li>${p}</li>`).join('')}</ul>
        ${prods}
      </div>
    </div>`);
  });

  // Skills
  C.skills.forEach(s=>{
    $('skillsGrid').insertAdjacentHTML('beforeend',
      `<div class="sk-card"><div class="sk-cat">${s.category}</div><div class="sk-items">${s.items}</div></div>`);
  });

  // Certs
  C.certs.forEach(c=>{
    $('certsGrid').insertAdjacentHTML('beforeend',
      `<div class="cert"><div><div class="cert-name">${c.name}</div><div class="cert-by">${c.issuer}</div></div><div class="cert-yr">${c.year}</div></div>`);
  });

  const ed=C.education;
  $('eduBlock').innerHTML=`<div class="edu-blk"><div><div class="edu-deg">${ed.degree}</div><div class="edu-uni">${ed.university}</div></div><div class="edu-yr">${ed.years}</div></div>`;

  // About
  const langs=`<div><div class="ab-title">Languages</div><ul class="lang-list">${C.about.languages.map(l=>`<li>${l.lang}<span class="lang-lv">${l.level}</span></li>`).join('')}</ul></div>`;
  const quals=`<div><div class="ab-title">Personal Qualities</div><ul class="q-list">${C.about.qualities.map(q=>`<li>${q}</li>`).join('')}</ul></div>`;
  $('aboutCols').innerHTML=langs+quals;

  // Footer
  $('fInfo').textContent=`${C.hero.firstName} ${C.hero.lastName} · ${C.hero.contacts[0].label}`;
})();


/* ─── INTRO DISMISS ─────────────────────── */
const introEl=document.getElementById('intro');
introEl.classList.add('out');
introEl.addEventListener('animationend',e=>{if(e.animationName==='iout')introEl.remove()},{once:true});


/* ─── CUSTOM CURSOR ─────────────────────── */
const cur=document.getElementById('cur');
const curR=document.getElementById('curR');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  cur.style.left=(mx-3.5)+'px';cur.style.top=(my-3.5)+'px';
});
(function animCur(){
  rx+=(mx-rx)*.13;ry+=(my-ry)*.13;
  curR.style.left=(rx-15)+'px';curR.style.top=(ry-15)+'px';
  requestAnimationFrame(animCur);
})();
document.querySelectorAll('a,button,.tag,.ppill,.sk-card,.cert').forEach(el=>{
  el.addEventListener('mouseenter',()=>{curR.style.transform='scale(2.2)';curR.style.opacity='.2'});
  el.addEventListener('mouseleave',()=>{curR.style.transform='scale(1)';curR.style.opacity='.45'});
});


/* ─── SCROLL REVEAL ─────────────────────── */
const io=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');io.unobserve(e.target)}});
},{threshold:.1});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));


/* ─── PARALLAX INITIALS ─────────────────── */
const bigInit=document.getElementById('hInit');
window.addEventListener('scroll',()=>{
  if(bigInit) bigInit.style.transform=`translateY(${window.scrollY*.16}px)`;
});
</script>
</body>
</html>
